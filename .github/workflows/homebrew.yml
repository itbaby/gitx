name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: itbaby/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}

      - name: Install Xcode Gen
        if: false  # Only needed if regenerating project

      - name: Get release info
        id: release
        run: |
          TAG_NAME=${{ github.event.inputs.tag || github.event.release.tag_name }}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS (Intel) DMG
        run: |
          curl -L -o gitx-intel.dmg \
            "https://github.com/itbaby/gitx/releases/download/${{ steps.release.outputs.tag }}/GitX_${{ steps.release.outputs.version }}_x86_64.dmg"

      - name: Download macOS (Apple Silicon) DMG
        run: |
          curl -L -o gitx-arm64.dmg \
            "https://github.com/itbaby/gitx/releases/download/${{ steps.release.outputs.tag }}/GitX_${{ steps.release.outputs.version }}_aarch64.dmg"

      - name: Calculate SHA256 checksums
        id: shas
        run: |
          echo "intel=$(shasum -a 256 gitx-intel.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "arm64=$(shasum -a 256 gitx-arm64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update Formula
        run: |
          VERSION=${{ steps.release.outputs.version }}
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Formula/gitx.rb
          sed -i '' "s|https://github.com/itbaby/gitx/releases/download/.*/GitX|https://github.com/itbaby/gitx/releases/download/${{ steps.release.outputs.tag }}/GitX|g" Formula/gitx.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${{ steps.shas.outputs.intel }}\"|" Formula/gitx.rb
          # Note: ARM64 SHA update needs to be done manually due to sed limitations
        working-directory: homebrew-tap

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          commit-message: "Update gitx to ${{ steps.release.outputs.version }}"
          title: "Update gitx to ${{ steps.release.outputs.version }}"
          body: |
            ## Summary
            Automated update of gitx Homebrew formula to version ${{ steps.release.outputs.version }}

            ## Changes
            - Updated version to ${{ steps.release.outputs.version }}
            - Updated download URLs
            - Updated SHA256 checksums

            This PR was created by the [Update Homebrew Formula](https://github.com/itbaby/gitx/actions/workflows/homebrew.yml) workflow.
          branch: update-gitx-${{ steps.release.outputs.version }}
          delete-branch: true
