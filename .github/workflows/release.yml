name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 14 = Apple Silicon, macOS-latest = Intel
          - os: macos-14
            target: aarch64-apple-darwin
            args: ''
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          # Windows build temporarily disabled due to cross-compilation issues
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   args: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: GitX ${{ github.event.inputs.version || github.ref_name }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `GitX_*_aarch64.dmg` |
            | Linux | `gitx_*_amd64.deb` |

            ## Homebrew Installation

            ```bash
            brew install itbaby/tap/gitx
            ```
          isPrerelease: true
          args: ${{ matrix.args }}
