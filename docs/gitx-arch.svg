<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">GitX Architecture</text>
  <text x="450" y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9d9db5" text-anchor="middle">AI-Powered Git Diff Analyzer</text>

  <!-- Tauri Window Frame -->
  <rect x="40" y="85" width="820" height="470" rx="12" fill="#1a1a24" stroke="#23232e" stroke-width="1"/>

  <!-- Window Title Bar -->
  <rect x="40" y="85" width="820" height="32" rx="12" fill="#111118"/>
  <rect x="40" y="105" width="820" height="12" fill="#111118"/>
  <!-- Window Buttons -->
  <circle cx="60" cy="101" r="5" fill="#ff5f57"/>
  <circle cx="78" cy="101" r="5" fill="#febc2e"/>
  <circle cx="96" cy="101" r="5" fill="#28c840"/>
  <text x="450" y="105" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9d9db5" text-anchor="middle">GitX - AI Git Diff Analyzer</text>

  <!-- Left Panel: Sidebar -->
  <rect x="50" y="125" width="180" height="420" rx="6" fill="#16161e" stroke="#23232e" stroke-width="1"/>
  <text x="65" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9d9db5" text-transform="uppercase" letter-spacing="0.5">REPOSITORIES</text>
  <rect x="65" y="155" width="150" height="28" rx="4" fill="#6C5CE720"/>
  <text x="75" y="173" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e4e4ed">/workspace/myproject</text>

  <text x="65" y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9d9db5" text-transform="uppercase" letter-spacing="0.5">BRANCHES</text>
  <rect x="65" y="212" width="120" height="24" rx="4" fill="#6C5CE730" stroke="#6C5CE7" stroke-width="1"/>
  <text x="75" y="228" font-family="SF Mono, monospace" font-size="11" fill="#a29bfe">main</text>
  <text x="65" y="260" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">develop</text>
  <text x="65" y="280" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">feature/auth</text>
  <text x="65" y="300" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">fix/login-bug</text>

  <text x="65" y="330" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9d9db5" text-transform="uppercase" letter-spacing="0.5">COMPARE WITH</text>
  <rect x="65" y="337" width="120" height="24" rx="4" fill="#2d2d3a"/>
  <text x="75" y="353" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">develop</text>

  <!-- Center Panel: Diff Viewer -->
  <rect x="240" y="125" width="340" height="420" rx="6" fill="#16161e" stroke="#23232e" stroke-width="1"/>
  <text x="255" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e4e4ed">Diff: main ↔ develop</text>
  <text x="540" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#00cec9">+142 -38</text>

  <!-- Diff Lines -->
  <rect x="255" y="158" width="310" height="24" rx="2" fill="#00cec910"/>
  <text x="265" y="174" font-family="SF Mono, monospace" font-size="11" fill="#00cec9">+</text>
  <text x="280" y="174" font-family="SF Mono, monospace" font-size="11" fill="#e4e4ed">func NewClient(config AIConfig) (*Client, error) {</text>

  <rect x="255" y="186" width="290" height="24" rx="2" fill="#00cec910"/>
  <text x="265" y="202" font-family="SF Mono, monospace" font-size="11" fill="#00cec9">+</text>
  <text x="280" y="202" font-family="SF Mono, monospace" font-size="11" fill="#e4e4ed">    client := openai.NewClient(options...)</text>

  <rect x="255" y="214" width="270" height="24" rx="2" fill="#2d2d3a"/>
  <text x="265" y="230" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5"> </text>
  <text x="280" y="230" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">return &Client{config: config}, nil</text>

  <rect x="255" y="242" width="250" height="24" rx="2" fill="#ff6b6b10"/>
  <text x="265" y="258" font-family="SF Mono, monospace" font-size="11" fill="#ff6b6b">-</text>
  <text x="280" y="258" font-family="SF Mono, monospace" font-size="11" fill="#ff6b6b">return nil, fmt.Errorf("not implemented")</text>

  <rect x="255" y="270" width="300" height="24" rx="2" fill="#2d2d3a"/>
  <text x="265" y="286" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5"> </text>
  <text x="280" y="286" font-family="SF Mono, monospace" font-size="11" fill="#9d9db5">}</text>

  <rect x="255" y="298" width="320" height="24" rx="2" fill="#00cec910"/>
  <text x="265" y="314" font-family="SF Mono, monospace" font-size="11" fill="#00cec9">+</text>
  <text x="280" y="314" font-family="SF Mono, monospace" font-size="11" fill="#e4e4ed">func (c *Client) AgentChat(ctx context.Context,</text>

  <rect x="255" y="326" width="280" height="24" rx="2" fill="#00cec910"/>
  <text x="265" y="342" font-family="SF Mono, monospace" font-size="11" fill="#00cec9">+</text>
  <text x="280" y="342" font-family="SF Mono, monospace" font-size="11" fill="#e4e4ed">    history []InputMessage) string {</text>

  <!-- File Stats -->
  <text x="255" y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9d9db5">3 files changed</text>
  <text x="255" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#00cec9">+89 additions</text>
  <text x="360" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ff6b6b">-42 deletions</text>

  <!-- Right Panel: AI Chat -->
  <rect x="590" y="125" width="260" height="420" rx="6" fill="#16161e" stroke="#23232e" stroke-width="1"/>
  <text x="605" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e4e4ed">AI Assistant</text>
  <circle cx="790" cy="143" r="4" fill="#00cec9"/>

  <!-- AI Message -->
  <rect x="605" y="160" width="230" height="120" rx="8" fill="#6C5CE715" stroke="#6C5CE730" stroke-width="1"/>
  <text x="620" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a29bfe">Based on the diff, I notice:</text>
  <text x="620" y="200" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e4e4ed">• 3 files modified</text>
  <text x="620" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e4e4ed">• New AI client with singleton</text>
  <text x="620" y="240" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e4e4ed">• SSE streaming added</text>
  <text x="620" y="260" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e4e4ed">• Breaking: removed error stub</text>

  <!-- Input Field -->
  <rect x="605" y="400" width="230" height="36" rx="18" fill="#2d2d3a" stroke="#6C5CE730" stroke-width="1"/>
  <text x="620" y="422" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6a6a7a">Ask about this diff...</text>
  <rect x="805" y="408" width="24" height="24" rx="12" fill="#6C5CE7"/>
  <text x="817" y="425" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#fff" text-anchor="middle">→</text>

  <!-- Bottom: Backend Stack -->
  <rect x="40" y="565" width="820" height="30" rx="6" fill="#111118"/>
  <text x="100" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6C5CE7">Rust</text>
  <text x="150" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="170" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6C5CE7">Tauri 2.0</text>
  <text x="230" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="250" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#00cec9">git2</text>
  <text x="300" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="320" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#00cec9">reqwest</text>
  <text x="390" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="410" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fd79a8">Vue 3</text>
  <text x="465" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="485" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fd79a8">TypeScript</text>
  <text x="560" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="580" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a29bfe">OpenAI API</text>
  <text x="680" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9d9db5">•</text>
  <text x="700" y="583" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#74b9ff">SSE Streaming</text>

  <!-- Decorative gradient bar -->
  <rect x="0" y="598" width="900" height="2" fill="url(#accentGrad)"/>
</svg>
