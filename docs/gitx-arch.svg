<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, sans-serif">
  <style>
    .box { rx: 10; ry: 10; stroke-width: 2; }
    .label { font-size: 14px; font-weight: 600; fill: #fff; }
    .sublabel { font-size: 11px; fill: #b2b2cc; }
    .arrow { stroke: #6C5CE7; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .title { font-size: 11px; fill: #9d9db5; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6C5CE7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0f" rx="12"/>

  <!-- Browser Section -->
  <rect x="20" y="20" width="300" height="360" class="box" fill="#111118" stroke="#23232e"/>
  <text x="170" y="50" class="title">Browser (Vue 3 + TypeScript)</text>

  <rect x="40" y="65" width="120" height="60" class="box" fill="#16161e" stroke="#6C5CE7"/>
  <text x="100" y="92" class="label" text-anchor="middle">Sidebar</text>
  <text x="100" y="108" class="sublabel" text-anchor="middle">Branches / Commits</text>

  <rect x="180" y="65" width="120" height="60" class="box" fill="#16161e" stroke="#6C5CE7"/>
  <text x="240" y="92" class="label" text-anchor="middle">DiffViewer</text>
  <text x="240" y="108" class="sublabel" text-anchor="middle">diff2html + hljs</text>

  <rect x="40" y="145" width="260" height="70" class="box" fill="#16161e" stroke="#6C5CE7"/>
  <text x="170" y="175" class="label" text-anchor="middle">AI Chat Panel</text>
  <text x="170" y="195" class="sublabel" text-anchor="middle">SSE Streaming / Markdown / Tool Status</text>

  <rect x="40" y="235" width="260" height="50" class="box" fill="#1a1a24" stroke="#23232e"/>
  <text x="170" y="260" class="sublabel" text-anchor="middle">Vite Dev Server (proxy /api to :8080)</text>

  <!-- Arrows: Browser to Backend -->
  <path d="M 320 170 L 370 170" class="arrow"/>
  <text x="345" y="162" class="title" font-size="9">SSE + REST</text>

  <!-- Backend Section -->
  <rect x="380" y="20" width="400" height="360" class="box" fill="#111118" stroke="#23232e"/>
  <text x="580" y="50" class="title">Backend (Go + Gin)</text>

  <rect x="400" y="65" width="170" height="60" class="box" fill="#16161e" stroke="#00b894"/>
  <text x="485" y="92" class="label" text-anchor="middle">Git Engine</text>
  <text x="485" y="108" class="sublabel" text-anchor="middle">go-git / branches / diff</text>

  <rect x="590" y="65" width="170" height="60" class="box" fill="#16161e" stroke="#6C5CE7"/>
  <text x="675" y="92" class="label" text-anchor="middle">AI Agent</text>
  <text x="675" y="108" class="sublabel" text-anchor="middle">OpenAI API / Tool Calling</text>

  <rect x="400" y="150" width="360" height="60" class="box" fill="#16161e" stroke="#74b9ff"/>
  <text x="580" y="177" class="label" text-anchor="middle">SSE Streaming</text>
  <text x="580" y="195" class="sublabel" text-anchor="middle">Chunk Buffering / Tool Events / Multi-line Data</text>

  <rect x="400" y="230" width="170" height="55" class="box" fill="#16161e" stroke="#23232e"/>
  <text x="485" y="255" class="label" text-anchor="middle">Git Tools</text>
  <text x="485" y="271" class="sublabel" text-anchor="middle">6 function tools</text>

  <rect x="590" y="230" width="170" height="55" class="box" fill="#16161e" stroke="#23232e"/>
  <text x="675" y="255" class="label" text-anchor="middle">Intent Parser</text>
  <text x="675" y="271" class="sublabel" text-anchor="middle">NL to Git actions</text>

  <rect x="400" y="310" width="360" height="55" class="box" fill="#1a1a24" stroke="#23232e"/>
  <text x="580" y="335" class="sublabel" text-anchor="middle">Singleton AI Client / 120s Timeout / CORS / SPA Fallback</text>

  <!-- Internal arrows -->
  <path d="M 675 125 L 675 150" class="arrow"/>
  <path d="M 485 125 L 485 150" class="arrow"/>
  <path d="M 485 280 L 485 310" class="arrow" stroke-dasharray="4 4"/>
  <path d="M 675 280 L 675 310" class="arrow" stroke-dasharray="4 4"/>
</svg>
